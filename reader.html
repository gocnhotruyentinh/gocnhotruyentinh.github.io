<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title id="comic-title">Đang tải...</title>
<link rel="icon" href="data:,">

<style>
/* ===== THEME VARIABLES ===== */
:root {
  --main-color: #ff4ecd;
  --bg-dark: #0a0014;
  --bg-gradient: linear-gradient(135deg, #0a0014, #1a0033);
  --card-bg: #140022;
  --text-primary: #ffccff;
  --text-secondary: #e0b0ff;
}

/* ===== BASE ===== */
body {
  margin: 0; padding: 0;
  background: var(--bg-gradient);
  color: var(--text-primary);
  font-family: 'Segoe UI', Arial, sans-serif;
  overflow-x: hidden;
  min-height: 100vh;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-dark); }
::-webkit-scrollbar-thumb { background: var(--main-color); border-radius: 10px; }

/* ===== CHAPTER & IMAGES ===== */
.chapter {
  display: flex; flex-direction: column; align-items: center;
  padding: 0; position: relative; z-index: 2;
}
.chapter h2 {
  margin: 20px 0 15px; color: var(--main-color);
  text-align: center; font-size: 1.5em;
  text-shadow: 0 0 10px rgba(255, 78, 205, 0.5);
  padding: 0 15px;
}
.chapter img {
  width: 100%; max-width: 100%; display: block;
  margin: 0; padding: 0; vertical-align: top;
  background: var(--card-bg); /* Placeholder khi ảnh chưa load */
}
/* ===== CONTROLS BAR ===== */
.controls {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%);
  background: rgba(20, 0, 34, 0.85);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 78, 205, 0.3);
  color: var(--text-primary);
  padding: 10px 20px; border-radius: 30px;
  z-index: 1000; display: flex; align-items: center; gap: 15px;
  font-size: 14px; box-shadow: 0 8px 25px rgba(255, 78, 205, 0.4);
  transition: opacity 0.3s;
}
.controls button {
  background: linear-gradient(45deg, var(--main-color), #7a00ff);
  color: #fff; border: none; padding: 8px 14px;
  border-radius: 10px; cursor: pointer; font-weight: bold;
  transition: all 0.2s ease; box-shadow: 0 4px 10px rgba(255, 78, 205, 0.3);
}
.controls button:hover { transform: scale(1.05); box-shadow: 0 6px 15px rgba(255, 78, 205, 0.6); }
.controls button:active { transform: scale(0.95); }
#page-info { font-weight: 500; color: var(--text-secondary); }

/* ===== LOADING / ERROR ===== */
.loading-msg, .error-msg {
  text-align: center; padding: 60px 20px;
  font-size: 1.3em; color: var(--text-secondary);
}
.error-msg { color: #ff6b81; text-shadow: 0 0 10px rgba(255, 107, 129, 0.3); }

/* ===== PETAL ANIMATION ===== */
#petal-container {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 1; overflow: hidden;
}
.petal {
  position: absolute; top: -30px; font-size: 16px; opacity: 0.7;
  animation: fall linear forwards;
  text-shadow: 0 0 8px rgba(255, 78, 205, 0.5); user-select: none;
}
@keyframes fall {
  to { transform: translateY(105vh) rotate(720deg); }
}

/* Tắt animation cho người nhạy cảm chuyển động */
@media (prefers-reduced-motion: reduce) {
  #petal-container { display: none; }
  * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}</style>
</head>

<body>

<div id="petal-container"></div>

<div id="pages" class="chapter">
  <div class="loading-msg">✨ Đang tải chapter...</div>
</div>

<div class="controls">
  <button onclick="history.back()">← Quay lại</button>
  <span id="page-info">0 / 0</span>
</div>

<script>
(function() {
  const container = document.getElementById('pages');
  const urlParams = new URLSearchParams(window.location.search);
  const storyId = urlParams.get('id');
  const chapIndex = parseInt(urlParams.get('chap'));

  if (!storyId || isNaN(chapIndex)) {
    container.innerHTML = '<div class="error-msg">❌ Thiếu thông tin chapter!</div>';
    return;
  }

  fetch('stories.json?t=' + Date.now())
    .then(r => {
      if (!r.ok) throw new Error("Không thể kết nối đến server");
      return r.json();
    })
    .then(data => {
      const story = data.find(s => s.id === storyId);
      if (!story) throw new Error("Truyện không tồn tại");

      const chap = story.chapters[chapIndex];
      if (!chap) throw new Error("Chapter không tồn tại");

      document.getElementById('comic-title').textContent = story.title + " - " + chap.name;
      container.innerHTML = `<h2>${chap.name}</h2>`;

      chap.images.forEach(src => {
        const img = document.createElement('img');
        img.src = src;
        img.alt = "page";
        img.loading = "lazy";
        container.appendChild(img);
      });
      const imgs = container.querySelectorAll('img');
      const total = imgs.length;
      const pageInfo = document.getElementById('page-info');
      pageInfo.textContent = `0 / ${total}`;

      window.addEventListener('scroll', () => {
        let current = 0;
        imgs.forEach((img, i) => {
          if (img.getBoundingClientRect().top < window.innerHeight / 2) current = i + 1;
        });
        pageInfo.textContent = `${current} / ${total}`;
      });
    })
    .catch(err => {
      container.innerHTML = `<div class="error-msg">❌ Lỗi: ${err.message}</div>`;
    });
})();

// ===== PETAL ANIMATION =====
function createPetal() {
  const box = document.getElementById('petal-container');
  if (!box) return;
  
  const petal = document.createElement("div");
  petal.className = "petal";
  petal.textContent = "🌸";

  const startX = Math.random() * window.innerWidth;
  const duration = Math.random() * 3 + 4;
  const size = Math.random() * 12 + 12;

  petal.style.left = startX + "px";
  petal.style.fontSize = size + "px";
  petal.style.opacity = Math.random() * 0.5 + 0.3;
  petal.style.animationDuration = duration + "s";

  box.appendChild(petal);
  setTimeout(() => petal.remove(), (duration + 0.5) * 1000);
}
setInterval(createPetal, 400);
for(let i=0; i<4; i++) setTimeout(createPetal, i*150);
</script>

</body>
</html>
